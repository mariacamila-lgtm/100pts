                <li><a href="5.html">Proyecto 5</a></li>
            </ul>
        </nav>
    </header>

<div id="wrapper">
    <h1 id="h1">JavaScript Project</h1>
    <h2 id="h2">Modal Popup</h2>
    <button id="openBtn">Abrir ventana</button>
</div>

<div id="modal">
  <div id="m-box">
    <button id="closeBtn">×</button>
    <h3 id="h3">¡Hola!</h3>
    <p id="p">Como te llamas??</p>
    <button id="innerCloseBtn">Cerrar</button>
  </div>
</div>

<script>
// 1. REFERENCIAS
const modal = document.getElementById("modal");
const box = document.getElementById("m-box");
const openBtn = document.getElementById("openBtn");
const closeBtn = document.getElementById("closeBtn");
const innerBtn = document.getElementById("innerCloseBtn");


document.body.style.cssText = "margin:0; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background:#fff; text-align:center;";


modal.style.cssText = "display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center;";


box.style.cssText = "background:white; padding:20px; border:1px solid #ccc; width:280px; position:relative; text-align:center;";


const btnBase = "padding:8px 16px; cursor:pointer; border:1px solid #333; background:white; font-size:14px;";
openBtn.style.cssText = btnBase;
innerBtn.style.cssText = btnBase + "margin-top:15px; width:100%;";
closeBtn.style.cssText = "position:absolute; top:5px; right:10px; border:none; background:none; font-size:20px; cursor:pointer;";


function abrir() {
    modal.style.display = "flex";
}

function cerrar() {
    modal.style.display = "none";
}

openBtn.onclick = abrir;
closeBtn.onclick = cerrar;
innerBtn.onclick = cerrar;


window.onclick = (e) => { if (e.target === modal) cerrar(); };

</script>

</body>
</html>>
