<!DOCTYPE html>
<html>
<body id="main-body">

    <header id="main-header">
        <nav>
            <ul id="nav-list">
                <li><a href="index.html">Proyecto 1</a></li>
                <li><a href="2.html">Proyecto 2</a></li>
                <li><a href="3.html">Proyecto 3</a></li>
                <li><a href="4.html">Proyecto 4</a></li>
                <li><a href="5.html">Proyecto 5</a></li>
            </ul>
        </nav>
    </header>

<div id="container">
    <h1 id="title">JavaScript Project</h1>
    <h2 id="subtitle">Counter</h2>

    <p id="count" style="font-size:60px; font-weight: bold; margin: 20px 0;">0</p>

    <button id="btnPlus">+</button>
    <button id="btnMinus">-</button>
    <button id="btnReset">Reset</button>
    <br><br>
    <button id="btnSave">Save</button>
    <button id="btnLoad">Load</button>
    
    <div id="msg-container" style="height: 50px; margin-top: 20px;"></div>
</div>

<script>

document.body.style.cssText = "display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif; background:#f0f4f8; text-align:center;";
document.getElementById("container").style.cssText = "background:white; padding:40px; border-radius:20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);";

document.querySelectorAll("button").forEach(btn => {
    btn.style.cssText = "padding:10px 20px; margin:5px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; background:#4a90e2; color:white; transition: 0.2s;";
    btn.onmouseover = () => btn.style.transform = "scale(1.1)";
    btn.onmouseout = () => btn.style.transform = "scale(1)";
});


document.getElementById("btnPlus").addEventListener("click", increaseCount);
document.getElementById("btnMinus").addEventListener("click", decreaseCount);
document.getElementById("btnReset").addEventListener("click", resetCount);
document.getElementById("btnSave").addEventListener("click", saveCount);
document.getElementById("btnLoad").addEventListener("click", loadCount);


let count = 0;


loadCount();


function updateCount() {
  document.getElementById("count").innerHTML = count;
  

  if (count !== 0 && count % 10 === 0) {
      lanzarFelicitacion();
  }
}


function lanzarFelicitacion() {
    const contenedor = document.getElementById("msg-container");
    const texto = document.createElement("div");
    
    texto.innerHTML = `🎉 ¡Felicidades! Has llegado al ${count} 🎉`;
    texto.style.cssText = "color: #27ae60; font-weight: bold; font-size: 1.2rem; animation: fadeUp 2s forwards;";
    
   
    contenedor.innerHTML = "";
    contenedor.appendChild(texto);
    
   
    setTimeout(() => {
        texto.style.opacity = "0";
        texto.style.transition = "1s";
    }, 2000);
}


function increaseCount() {
  count++;
  updateCount();
}


function decreaseCount() {
  if (count > 0) {
    count--;
    updateCount();
  }
}


function resetCount() {
  count = 0;
  document.getElementById("msg-container").innerHTML = "";
  updateCount();
}

function saveCount() {
  localStorage.setItem("count", count);
}

function loadCount() {
  let saved = localStorage.getItem("count");
  if (saved !== null) {
    count = Number(saved);
  }
  updateCount();
}
</script>

</body>
</html>
